name: XSS Two Agent Pipeline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Your site URL or preview URL"
        required: true
        type: string

permissions:
  contents: read
  models: read

jobs:
  testing_agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install agent dependencies
        working-directory: agents
        run: npm install

      - name: Install Playwright browsers
        working-directory: agents
        run: npx playwright install --with-deps

      - name: Run testing agent
        run: node agents/testing-agent.js
        env:
          TARGET_URL: ${{ inputs.target_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_MODEL: openai/gpt-4.1

      - name: Show testing report
        if: always()
        run: |
          if [ -f agents/testing-report.md ]; then
            cat agents/testing-report.md
          else
            echo "testing-report.md was not created"
          fi

      - name: Upload testing output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testing-output
          path: |
            agents/findings.json
            agents/testing-report.md
            agents/screenshots/
          if-no-files-found: warn