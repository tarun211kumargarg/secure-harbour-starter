name: XSS Scout

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Your site URL or Azure preview URL"
        required: true
        type: string

permissions:
  contents: read
  models: read

jobs:
  run-xss-scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run agentic XSS scout
        run: node agents/xss-scout.js
        env:
          TARGET_URL: ${{ inputs.target_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_MODEL: openai/gpt-4.1
          MAX_AGENT_TURNS: "6"

      - name: Show final report
        run: cat agents/xss-report.md