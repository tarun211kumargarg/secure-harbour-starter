name: XSS Two Agent Pipeline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Your site URL or preview URL"
        required: true
        type: string

permissions:
  contents: read
  models: read

jobs:
  testing_agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npx playwright install --with-deps
      - run: node agents/testing-agent.js
        env:
          TARGET_URL: ${{ inputs.target_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_MODEL: openai/gpt-4.1
      - uses: actions/upload-artifact@v4
        with:
          name: testing-output
          path: |
            agents/findings.json
            agents/testing-report.md
            agents/screenshots/

  patching_agent:
    needs: testing_agent
    environment: patch-approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/download-artifact@v4
        with:
          name: testing-output
          path: agents/testing-output
      - run: node agents/patch-agent.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_MODEL: openai/gpt-4.1
      - uses: actions/upload-artifact@v4
        with:
          name: patch-output
          path: |
            agents/patch-report.md
            agents/remediation.patch

  final_report:
    needs: [testing_agent, patching_agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: testing-output
          path: agents/testing-output
      - uses: actions/download-artifact@v4
        with:
          name: patch-output
          path: agents/patch-output
      - run: node agents/final-report.js
      - uses: actions/upload-artifact@v4
        with:
          name: final-xss-report
          path: agents/final-report.md