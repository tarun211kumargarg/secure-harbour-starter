name: XSS Scout

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Your site URL or Azure preview URL"
        required: true
        type: string
      allow_form_post:
        description: "false for first run; true only for your own preview/staging if you want one active POST probe"
        required: true
        default: "false"
        type: string

jobs:
  run-xss-scout:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run autonomous XSS agent
        run: node agents/xss-scout.js
        env:
          TARGET_URL: ${{ inputs.target_url }}
          ALLOW_FORM_POST: ${{ inputs.allow_form_post }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4
          MAX_AGENT_TURNS: "6"

      - name: Show final report
        run: cat agents/xss-report.md