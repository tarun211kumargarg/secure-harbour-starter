<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Secure Harbour</title>
  <meta name="description" content="Thank you for contacting Secure Harbour.">
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">
        <img src="/assets/logo.svg" alt="Secure Harbour logo">
        <span>Secure Harbour</span>
      </a>
      <nav class="nav">
        <a href="/services" data-nav>Services</a>
        <a href="/about" data-nav>About</a>
        <a href="/contact" data-nav>Contact</a>
      </nav>
      <div class="header-cta">
        <a class="btn btn-primary" href="/contact">Request Consultation</a>
      </div>
    </div>
  </header>

  <main>
    <section>
      <div class="container">
        <div class="page-hero">
          <div class="kicker">Thank you</div>
          <h1>Your query has been received.</h1>
          <p>The submission is now available in the secure admin dashboard for review. You can return to the homepage or submit another request.</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="/">Back to Home</a>
            <a class="btn btn-light" href="/contact">Submit Another Query</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <strong>Secure Harbour</strong>
      </div>
      <div class="footer-meta">
        <span>&copy; <span data-year></span></span>
      </div>
    </div>
  </footer>

  <script src="/assets/app.js"></script>
</body>
</html>
